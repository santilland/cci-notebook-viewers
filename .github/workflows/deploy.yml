name: Deploy Jupyter Book

on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  # `BASE_URL` determines the website is served from, including CSS & JS assets
  # You may need to change this to `BASE_URL: ''`
  BASE_URL: /${{ github.event.repository.name }}
jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: 'true'

      - name: Set up Python
        uses: actions/setup-python@82c3527a01973a0237807ba390c1c739116753dd # v5.3.0
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Jupyter Book
        run: |
          # Clear potential other myst configurations in external_notebooks
          find external_notebooks -type f \( -iname "myst.yaml" -o -iname "myst.yml" \) -exec rm -v {} +
          jupyter book build --html

          # FIX: Overwrite hardcoded Webpack publicPath in MyST/Thebe bundles to respect BASE_URL
          if [ -n "$BASE_URL" ]; then
            find _build/html -type f -name "thebe-*.min.js" -exec sed -i "s|__webpack_require__\.p=\"/\"|__webpack_require__.p=\"${BASE_URL}/\"|g" {} +
          fi

      - name: Generate Notebook List
        run: |
          python .github/workflows/generate_notebook_list.py
          cp notebooks.json _build/html/notebooks.json
          cp index.html _build/html/index.html
          touch _build/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@6c306341ee84596d2f74e8b289fe4487496c51c7 # v4.7.3
        with:
          folder: _build/html/
          branch: gh-pages
          clean-exclude: pr-preview
          force: false
